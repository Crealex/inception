version: "3"

services:
  mariadb_off:
    image: mariadb:latest
    container_name: mariadb_off
    env_file: .env
    networks:
      - inception
    volumes:
      - db:/var/lib/mysql
    expose:
      - "3306"
    restart: always

  nginx_off:
    image: nginx:latest
    container_name: nginx_off
    env_file: .env
    networks:
      - inception
    ports:
      - "443:443"
    depends_on:
      - wordpress_off
    volumes:
      - site:/var/www/wordpress
      - ./requirements/nginx/config/certif:/etc/nginx/ssl
      - ./requirements/nginx/config/:/etc/nginx/conf.d
    restart: always

  wordpress_off:
    image: wordpress:latest
    container_name: wordpress_off 
    env_file: .env
    networks:
      - inception
    volumes:
      - site:/var/www/html
    depends_on:
      - mariadb_off
    restart: always
    expose:
      - "9000"

volumes:
  site:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: "/home/atomasi/data/wordpress"
  db:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: "/home/atomasi/data/mariadb"

networks:
  inception:
    driver: bridge
