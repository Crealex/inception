services:

  mariadb_off:
    image: mariadb:latest
    networks:
        - inception
    volumes: 
     - mariadb:database/
    expose: 
      - "3306"
    restart: unless-stopped

  nginx_off:
    image: nginx:latest
    networks:
        - inception
    ports:
      - "443:443"
    depends_on:
      - wordpress_off
    volumes:
      - wordpress:www/
    restart: on-failure

  wordpress_off:
    image: wordpress:latest
    networks:
        - inception
    volumes:
        - wordpress:srcs/
    depends_on:
      - mariadb_off
    restart: on-failure
    expose:
      - "9000"

volumes:



