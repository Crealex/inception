events {
	worker_connections 2000;
}

http {
	server {
		listen 443 ssl;
		server_name atomasi.42.fr;

		ssl_certificate     /etc/nginx/ssl/myself.crt;
		ssl_certificate_key /etc/nginx/ssl/myself.key;
		ssl_protocols       TLSv1.2 TLSv1.3;

		root /var/www/html;

		location / {
		index  index.php index.html;
		try_files	$uri $uri/ =404;
		}

		location ~ \.php$ {
			fastcgi_pass    wordpress:9000;
			include		snippets/fastcgi-php.conf;
		}
	}
}
