server {
        listen 443 ssl;
        server_name atomasi.42.fr;

	ssl_certificate     /etc/nginx/ssl/myself.crt;
	ssl_certificate_key /etc/nginx/ssl/myself.key;
	ssl_protocols       TLSv1.2 TLSv1.3;

	root /var/www/html;

	location / {
        index  index.php index.html;
	try_files	$uri $uri/ /index.php?$args;
    	}

        location ~ \.php$ {
                fastcgi_pass    wordpress_off:9000;
                fastcgi_index   index.php;
		fastcgi_param	SCRIPT_FILENAME $document_root$fastcgi_script_name;
                include         fastcgi_params;
        }
}
